<!DOCTYPE html>
<html lang="fr">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Portfolio</title>

    <style>

  /* Reset — supprime les marges par défaut du navigateur */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  /* Le fond et la police de base */
  body {
    background-color: #ffffff;
    font-family: sans-serif;
  }

  /* La navigation */
  nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 28px 56px;
  }

  /* Le logo */
  .logo {
    font-size: 22px;
    font-weight: 700;
    text-decoration: none;
    color: black;
  }

  .logo span {
    color: #e63946;
  }

  /* Les liens de nav */
  ul {
    display: flex;
    gap: 40px;
    list-style: none;
  }

  ul a {
    text-decoration: none;
    color: black;
    font-size: 14px;
  }

  /* Le bouton contact */
  .btn-contact {
    background-color: black;
    color: white;
    padding: 12px 24px;
    text-decoration: none;
    font-size: 13px;
    border-radius: 4px;
  }

</style>
    
  </head>

  <body>

    <nav>
      <!-- Logo à gauche -->
      <a href="#" class="logo">ROQUES Martin<span>.</span></a>
      
      <!-- Liens au centre -->
      <ul>
        <li><a href="#projets">Projets</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>

  <!-- Bouton à droite -->
  <a href="mailto:tonemail@gmail.com" class="btn-contact">
    roques.martin34@gmail.com
  </a>
      
    </nav>

    <main>
      
  <!-- Petite phrase d'intro -->
  <p class="intro">👋 Bonjour, je m'appelle ROQUES Martin </p>

  <!-- Titre massif -->
  <h1>
    <span class="filled"> DATA Analyst </span>
    <span class="outline">&amp; Cartographie.</span>
  </h1>

  <!-- Infos en bas -->
  <p class="location">Basé à Montpellier, France.</p>

  <!-- Les 2 boutons -->
  <div class="cta">
    <a href="#projets" class="btn-dark">Voir mes projets</a>
    <a href="#contact" class="btn-light">Me contacter</a>
  </div>
      
    </main>

    <footer>
      <!-- Bas de page -->
    </footer>

  </body>

</html>
